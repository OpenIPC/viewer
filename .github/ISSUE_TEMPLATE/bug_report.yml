name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you did, what you expected, what actually happened.
      placeholder: |
        1. Added a camera via Discovery
        2. Opened it in single-camera view
        3. Expected live video; got a "Disconnected" overlay
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - macOS
        - Android
        - iOS
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: Release tag or commit SHA, if known.
      placeholder: v0.3.2
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Logs & additional context
      description: |
        Optional but very helpful: the day's log file (review for credentials first),
        camera model/firmware, screenshots, network setup (NAT, VPN).
        Logs live at:
        - Windows: `%LOCALAPPDATA%\OpenIPC.Viewer\logs\`
        - Linux: `~/.local/share/openipc-viewer/logs/`
        - macOS: `~/Library/Application Support/OpenIPC.Viewer/logs/`
    validations:
      required: false
