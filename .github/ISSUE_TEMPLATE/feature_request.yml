name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What's missing or awkward today, and what would you like to happen? A couple of sentences is enough.
      placeholder: "When I have 12 cameras, I can't ... It would be great if ..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional — platforms it matters on, mockups, links, similar apps, workarounds you've tried.
    validations:
      required: false
